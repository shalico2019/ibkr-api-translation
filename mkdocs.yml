site_name: 盈透证券 API 中文文档
site_description: Interactive Brokers TWS API 与 Client Portal API 的中文翻译与实战指南
site_author: shalico2019
site_url: https://shalico2019.github.io/ibkr-api-translation/
repo_url: https://github.com/shalico2019/ibkr-api-translation
repo_name: shalico2019/ibkr-api-translation
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  font:
    text: Noto Sans SC
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/shalico2019
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.smartsymbols
  - pymdownx.magiclink:
      repo_url_shorthand: true
      social_url_shorthand: true

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      fallback_to_build_date: true

nav:
  - 首页: index.md
  - 术语表: glossary.md
  - TWS API:
      - tws-api/README.md
      - Introduction: tws-api/introduction.md
      - Notes & Limitations: tws-api/notes_and_limitations.md
  - Client Portal API:
      - client-portal-api/README.md
      - 概述: client-portal-api/overview.md
      - Session: client-portal-api/session.md
      - 认证: client-portal-api/authentication.md
      - 账户: client-portal-api/account.md
      - 订单: client-portal-api/orders.md
      - 持仓: client-portal-api/portfolio.md
      - 行情: client-portal-api/market_data.md
  - TWS 使用手册:
      - tws-manual/README.md
      - P0 新手必读:
          - 入门概览: tws-manual/getting-started.md
          - 首次登录与双因素认证: tws-manual/login.md
          - 基础配置: tws-manual/configuration.md
          - 账户窗口: tws-manual/account-window.md
          - 市场数据: tws-manual/market-data.md
          - 订单类型: tws-manual/order-types.md
          - 订单管理: tws-manual/order-management.md
          - 图表基础: tws-manual/charts.md
          - 自选列表: tws-manual/watchlist.md
          - 警报与通知: tws-manual/alerts-and-notifications.md
      - P1 进阶 UI 与常用功能:
          - Mosaic 界面: tws-manual/mosaic.md
          - 预设与自定义布局: tws-manual/layouts.md
          - 快捷键: tws-manual/hot-keys.md
          - 滚动行情条: tws-manual/ticker-tape.md
          - 逐笔成交: tws-manual/time-and-sales.md
          - 订单预设: tws-manual/order-presets.md
          - 订单共享模式: tws-manual/order-sharing-modes.md
          - 下单面板: tws-manual/order-ticket.md
          - 外汇交易器: tws-manual/fx-trader.md
          - 风险导航器: tws-manual/risk-navigator.md
          - 市场扫描器: tws-manual/market-scanners.md
          - 基本面分析: tws-manual/fundamental-analytics.md
          - 新闻与研究: tws-manual/news.md
          - 投资组合分析: tws-manual/portfolio-analyst.md
          - 颜色联动: tws-manual/color-grouping.md
  - IBKR Desktop:
      - ibkrdesktop/README.md
  - IBKR Mobile:
      - ibkr-mobile/README.md
  - Client Portal 使用手册:
      - client-portal-manual/README.md
  - Advisor Portal:
      - advisor-portal/README.md
  - Broker Portal:
      - broker-portal/README.md
  - Org Portal:
      - org-portal/README.md
  - IBKR GlobalTrader:
      - ibkr-globaltrader/README.md
  - IBKR ForecastTrader:
      - ibkr-forecasttrader/README.md
  - 实战策略:
      - strategies/README.md
      - 均线交叉: strategies/ma-crossover.md
      - 突破策略: strategies/breakout.md
      - 网格交易: strategies/grid.md
  - 贡献指南: CONTRIBUTING.md

